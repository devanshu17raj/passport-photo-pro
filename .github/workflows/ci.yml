name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect backend folder (handles Backend/ or backend/)
        run: |
          if [ -d "Backend" ]; then
            echo "BACKEND_DIR=Backend" >> $GITHUB_ENV
          else
            echo "BACKEND_DIR=backend" >> $GITHUB_ENV
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ env.BACKEND_DIR }}/requirements-ci.txt

      - name: Install dependencies (fast — no rembg)
        run: pip install -r ${{ env.BACKEND_DIR }}/requirements-ci.txt

      - name: Run pytest
        # Run from the backend directory so conftest.py and pytest.ini are found
        working-directory: ${{ env.BACKEND_DIR }}
        run: pytest -v --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          SECRET_KEY: "ci-test-secret"
          PYTHONPATH: "."

  # ── Frontend: build ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect frontend folder (handles Frontend/ or frontend/)
        run: |
          if [ -d "Frontend" ]; then
            echo "FRONTEND_DIR=Frontend" >> $GITHUB_ENV
          else
            echo "FRONTEND_DIR=frontend" >> $GITHUB_ENV
          fi

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Use npm cache without lock file dependency to handle missing package-lock
          cache: "npm"
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        # Use npm install instead of npm ci — works even if package-lock.json
        # was not committed (npm ci requires the lock file)
        run: npm install

      - name: Build
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build
        env:
          VITE_API_URL: "https://placeholder-backend.onrender.com"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIR }}/dist
          retention-days: 7

  # ── Docker: build check ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect folder names
        run: |
          if [ -d "Backend" ]; then echo "BACKEND_DIR=Backend" >> $GITHUB_ENV; else echo "BACKEND_DIR=backend" >> $GITHUB_ENV; fi
          if [ -d "Frontend" ]; then echo "FRONTEND_DIR=Frontend" >> $GITHUB_ENV; else echo "FRONTEND_DIR=frontend" >> $GITHUB_ENV; fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.BACKEND_DIR }}
          push: false
          tags: passport-photo-pro-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.FRONTEND_DIR }}
          push: false
          tags: passport-photo-pro-frontend:ci
          build-args: |
            VITE_API_URL=https://placeholder-backend.onrender.com
          cache-from: type=gha
          cache-to: type=gha,mode=max